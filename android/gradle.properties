org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Flutter's default abiFilters (which includes x86_64) so we can exclude
# x86/x86_64 - TensorFlow Lite libs in those ABIs don't support 16 KB page size.
disable-abi-filtering=true
# Network timeout settings to prevent hanging
systemProp.http.connectionTimeout=10000
systemProp.http.socketTimeout=10000
systemProp.https.connectionTimeout=10000
systemProp.https.socketTimeout=10000
